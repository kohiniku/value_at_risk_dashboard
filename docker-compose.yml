services:
  backend:
    image: ${IMAGE_REGISTRY:-}${BACKEND_IMAGE:-value-at-risk-backend}:${BACKEND_TAG:-latest}
    build:
      context: ./backend
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME:-Value at Risk API}
      API_V1_STR: ${API_V1_STR:-/api/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      VAR_DATA_SOURCE: ${VAR_DATA_SOURCE:-auto}
    expose:
      - "8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    restart: unless-stopped

  frontend:
    image: ${IMAGE_REGISTRY:-}${FRONTEND_IMAGE:-value-at-risk-frontend}:${FRONTEND_TAG:-latest}
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
      NEXT_PUBLIC_REFRESH_INTERVAL_MS: ${NEXT_PUBLIC_REFRESH_INTERVAL_MS:-0}
      # pnpm install がレジストリに到達するためのプロキシ設定（ホスト環境変数から受け渡し）
      # HTTPS_PROXY だけでは pnpm が拾わないため npm_config_* 形式でも渡す
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-}
      npm_config_proxy: ${HTTP_PROXY:-}
      npm_config_https_proxy: ${HTTPS_PROXY:-}
      npm_config_noproxy: ${NO_PROXY:-}
    command:
      - /bin/sh
      - -c
      - |
        pnpm install --prefer-offline --frozen-lockfile --config.confirmModulesPurge=false
        pnpm dev --hostname 0.0.0.0 --port 3000
    depends_on:
      - backend
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  nginx:
    image: nginx
    depends_on:
      - frontend
      - backend
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT}:80"
    restart: unless-stopped
